name: Build and Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: leanprover/lean-action@v1
        with:
          build-args: >-
            DiscreteGameTheory
            DiscreteGameTheoryExamples
            DiscreteGameTheory:literate
            DiscreteGameTheoryExamples:literate
            generate-docs

      - name: Render HTML
        run: |
          mkdir -p _site/lib _site/examples
          lake exe verso-html .lake/build/literate/DiscreteGameTheory _site/lib
          lake exe verso-html .lake/build/literate/DiscreteGameTheoryExamples _site/examples
          lake exe generate-docs _site/docs || true
          if [ ! -d _site/docs ]; then
            cp -r _out/html-multi _site/docs
          fi

      - name: Create landing page
        run: |
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Discrete Game Theory</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 48em; margin: 2em auto; padding: 0 1em; line-height: 1.6; }
              h1 { margin-bottom: 0.25em; }
              h2 { margin-top: 1.5em; }
              ul { padding-left: 1.5em; }
              a { color: #2563eb; }
              code { background: #f3f4f6; padding: 0.15em 0.3em; border-radius: 3px; font-size: 0.9em; }
              .subtitle { color: #6b7280; margin-top: 0; }
            </style>
          </head>
          <body>
            <h1>Discrete Game Theory</h1>
            <p class="subtitle">A Lean 4 formalization of discrete game theory fundamentals — games and Nash equilibria without probabilities.</p>

            <h2>Guide</h2>
            <ul>
              <li><a href="docs/">Discrete Game Theory</a> &mdash; narrative introduction with interactive code</li>
            </ul>

            <h2>Library Source</h2>
            <ul>
              <li><a href="lib/DiscreteGameTheory/Base/">Base</a> &mdash; Sign, Face, SignGame, Dominates, OutsideDom, Nash existence</li>
              <li><a href="lib/DiscreteGameTheory/Refinement/">Refinement</a> &mdash; Betweenness, SignTower, Nash refinement sequence</li>
              <li><a href="lib/DiscreteGameTheory/CompactGame/">CompactGame</a> &mdash; <code>nash_of_core</code>, <code>iterEmbedClose</code>, <code>shift</code></li>
              <li><a href="lib/DiscreteGameTheory/SelfSimilarity/">SelfSimilarity</a> &mdash; <code>embedIter</code>, <code>restrictGame</code>, <code>multiLevelGame</code></li>
              <li><a href="lib/DiscreteGameTheory/Invariance/">Invariance</a> &mdash; Ordinal invariance, affine invariance, counterexample</li>
            </ul>

            <h2>Examples Source</h2>
            <ul>
              <li><a href="examples/DiscreteGameTheoryExamples/Examples/">Examples</a> &mdash; PD, MP, coordination, pedagogical proofs</li>
              <li><a href="examples/DiscreteGameTheoryExamples/GridTower/">GridTower</a> &mdash; Grid constructions, bilinear towers, compact game examples</li>
            </ul>
          </body>
          </html>
          HTMLEOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
